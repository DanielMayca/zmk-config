# Keyboard name for Bluetooth
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# Increase Bluetooth TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable deep sleep (saves battery when idle)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable eager debouncing for faster key response
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Uncomment to enable USB logging for debugging
# CONFIG_ZMK_USB_LOGGING=y
